            [重度标记]


            如果是轻中度（<8分），在最后加上：

            [轻中度标记]


            示例输出：

            【评估结果】

            失眠类型：入睡困难

            评分：9/10分

            级别：重度

            主要原因：工作压力导致焦虑

            [重度标记]'
