          text: '你是睡眠问题分析专家。


            根据对话历史{{#conversation.conversation_his#}}，完成以下任务：


            1. 提取用户的失眠类型（入睡困难/中途觉醒/早醒）

            2. 评估严重程度（1-10分）

            3. 判断级别


            ## 判断标准

            - 8-10分：重度失眠（建议就医）

            - 1-7分：轻中度失眠（可自我改善）


            ## 输出格式


            严格按照以下格式输出：


            【评估结果】

            失眠类型：[入睡困难/中途觉醒/早醒]

            评分：X/10分

            级别：[重度/轻中度]

            主要原因：[简短描述]


